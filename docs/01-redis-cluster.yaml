        - "6381"
        - --cluster-enabled
        - "yes"
        - --cluster-announce-ip
        - "192.168.56.186"
        - --cluster-announce-port
        - "6381"
        - --cluster-announce-bus-port
        - "16381"
        - --protected-mode
        - "no"
        - --bind
        - "0.0.0.0"
        - --save
        - ""
        - --appendonly
        - "no"
      ports:
        - containerPort: 6381
