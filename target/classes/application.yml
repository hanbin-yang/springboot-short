server:
  port: 8080

spring:
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      cluster:
        # 部署后根据 Job 日志输出的实际 IP:Port 填写
        # redis-0 在 worker 节点(187)，redis-1/redis-2 在 master 节点(186)
        nodes:
          - 192.168.56.187:6379
          - 192.168.56.186:6380
          - 192.168.56.186:6381
        max-redirects: 3
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
        cluster:
          refresh:
            period: 2000s
  datasource:
    url: jdbc:h2:mem:seckill;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
