server:
  port: 8080

spring:
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
        cluster:
          refresh:
            period: 2000s
